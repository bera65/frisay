<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B82F6"/><stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1D4ED8" flood-opacity=".25"/>
    </filter>
  </defs>
  <!-- floating card left -->
  <g filter="url(#s)">
    <rect x="28" y="86" width="180" height="220" rx="14" fill="#fff" stroke="#E5E7EB"/>
    <rect x="44" y="104" width="148" height="88" rx="8" fill="url(#g2)"/>
    <rect x="44" y="208" width="100" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="44" y="228" width="148" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="44" y="246" width="120" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="44" y="272" width="70" height="18" rx="6" fill="url(#g1)"/>
  </g>
  <!-- main monitor -->
  <g filter="url(#s)">
    <rect x="190" y="58" width="340" height="250" rx="16" fill="#0F172A"/>
    <rect x="202" y="70" width="316" height="210" rx="8" fill="url(#g2)"/>
    <rect x="220" y="92" width="120" height="14" rx="7" fill="#2563EB"/>
    <rect x="220" y="120" width="200" height="10" rx="5" fill="#94A3B8"/>
    <rect x="220" y="140" width="160" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="220" y="168" width="90" height="70" rx="8" fill="#fff" stroke="#BFDBFE"/>
    <rect x="322" y="168" width="90" height="70" rx="8" fill="#fff" stroke="#BFDBFE"/>
    <rect x="424" y="168" width="70" height="70" rx="8" fill="#fff" stroke="#BFDBFE"/>
    <text x="360" y="250" text-anchor="middle" fill="#1D4ED8" font-family="Poppins,Arial,sans-serif" font-size="22" font-weight="800">Frisay</text>
    <rect x="300" y="308" width="120" height="14" rx="4" fill="#334155"/>
    <rect x="250" y="322" width="220" height="10" rx="3" fill="#1E293B"/>
  </g>
  <!-- floating card right -->
  <g filter="url(#s)">
    <rect x="430" y="250" width="180" height="160" rx="14" fill="#fff" stroke="#E5E7EB"/>
    <rect x="446" y="266" width="148" height="70" rx="8" fill="url(#g1)" opacity=".9"/>
    <rect x="446" y="350" width="90" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="446" y="370" width="148" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="446" y="386" width="60" height="12" rx="6" fill="#2563EB"/>
  </g>
  <!-- tablet -->
  <g filter="url(#s)">
    <rect x="120" y="300" width="120" height="150" rx="12" fill="#0F172A"/>
    <rect x="128" y="310" width="104" height="122" rx="6" fill="#EFF6FF"/>
    <rect x="140" y="326" width="80" height="8" rx="4" fill="#2563EB"/>
    <rect x="140" y="344" width="80" height="6" rx="3" fill="#94A3B8"/>
    <rect x="140" y="360" width="60" height="6" rx="3" fill="#CBD5E1"/>
    <circle cx="180" cy="444" r="5" fill="#475569"/>
  </g>
</svg>
